<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AutoEDA — AI-Powered Data Preprocessing and Exploratory Data Analysis. Upload your dataset and get ML-ready data automatically.">
  <title>AutoEDA — AI Data Preprocessing Assistant</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  
  <div class="toast-container" id="toastContainer"></div>

  <div class="app-container">

    
    <header class="app-header">
      <h1 class="app-logo">
        <span class="logo-icon">⚡</span>
        AutoEDA
      </h1>
      <p class="app-tagline">AI-Powered Data Preprocessing &amp; Exploratory Analysis</p>
    </header>

    
    <div class="card" id="uploadCard">
      <h2 class="card-title"><span class="icon">📂</span> Upload Dataset</h2>

      
      <div class="upload-zone" id="uploadZone">
        <span class="upload-icon">☁️</span>
        <p class="upload-text">
          Drag &amp; drop your file here or <strong>click to browse</strong>
        </p>
        <p class="upload-hint">Supports CSV, Excel (.xlsx), JSON — up to 100 MB</p>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.json">
      </div>

      
      <div class="file-info" id="fileInfo">
        <span class="file-icon">📄</span>
        <div class="file-details">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
        <button class="file-remove" id="fileRemove" title="Remove file">✕</button>
      </div>

      
      <div class="dataset-preview" id="datasetPreview">
        <h3 class="card-title" style="font-size:1rem;margin-top:0.5rem;"><span class="icon">👁️</span> Preview (first 5 rows)</h3>
        <div id="previewTableWrap"></div>
      </div>

      
      <div class="btn-group">
        <button class="btn btn-primary" id="btnUpload" disabled>
          <span>⬆️</span> Upload
        </button>
        <button class="btn btn-success" id="btnProcess" disabled>
          <span>🚀</span> Process Dataset
        </button>
      </div>
    </div>

    
    <div id="progressContainer" style="display:none; text-align:center; padding: 20px;">
       <p>Processing dataset... please wait.</p>
    </div>

  </div>

  <script src="/js/app.js"></script>
</body>
</html>
